<select formControlName="tipoUsuario">
  <option value="cliente">Cliente comum</option>
  <option value="luthier">Luthier</option>
</select>

@if (cadastroForm.get('tipoUsuario')?.value === 'luthier') {
  <input 
    type="number" 
    formControlName="tempoExperiencia" 
    placeholder="Há quantos anos atua na área?" 
  />

  <input 
    type="text" 
    formControlName="instrumentosAtendidos" 
    placeholder="Instrumentos que atende. Ex: violão, guitarra, baixo" 
  />

  <textarea 
    formControlName="descricaoProfissional" 
    placeholder="Descreva sua experiência como luthier">
  </textarea>
}
